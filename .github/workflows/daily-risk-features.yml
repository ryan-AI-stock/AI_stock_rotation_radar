name: Update daily risk feature sources

on:
  schedule:
    # 21:30 first attempt and 23:00 bounded retry in Asia/Taipei.
    - cron: "30 13 * * 1-5"
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Single Taiwan market date (YYYY-MM-DD)"
        required: false
        default: ""
      backfill_start:
        description: "Optional bounded backfill start (YYYY-MM-DD)"
        required: false
        default: ""
      backfill_end:
        description: "Optional bounded backfill end (YYYY-MM-DD)"
        required: false
        default: ""
      retry_families:
        description: "Optional failed family groups only: price,chips,foreign_ownership,taifex,global,corporate_action,tdcc"
        required: false
        default: ""

concurrency:
  group: daily-risk-feature-sources
  cancel-in-progress: false

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Validate pipeline
        run: |
          python -m compileall rotation_radar tests
          python -m unittest tests.test_daily_risk_features -v

      - name: Resolve arguments
        id: args
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.backfill_start }}" ] || [ -n "${{ inputs.backfill_end }}" ]; then
            if [ -z "${{ inputs.backfill_start }}" ] || [ -z "${{ inputs.backfill_end }}" ]; then
              echo "Both backfill dates are required." >&2
              exit 2
            fi
            echo "value=--backfill-start ${{ inputs.backfill_start }} --backfill-end ${{ inputs.backfill_end }}" >> "$GITHUB_OUTPUT"
          else
            target="${{ inputs.target_date }}"
            if [ -z "$target" ]; then target="$(TZ=Asia/Taipei date +%F)"; fi
            echo "value=--date $target" >> "$GITHUB_OUTPUT"
            echo "target=$target" >> "$GITHUB_OUTPUT"
            echo "mode=single" >> "$GITHUB_OUTPUT"
          fi
          retry="${{ inputs.retry_families }}"
          if [ -n "$retry" ]; then
            echo "retry=--retry-families $retry" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            python - "${target:-}" "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys
          from pathlib import Path
          from rotation_radar.daily_risk_features import retry_groups_from_manifest

          target, output = sys.argv[1:]
          if not target:
              with open(output, "a", encoding="utf-8") as handle:
                  handle.write("retry=\nskip=false\nmode=backfill\n")
              raise SystemExit(0)
          path = Path("data/risk_features/daily") / target.replace("-", "/") / "manifest.json"
          retry = ""
          skip = "false"
          if path.exists():
              payload = json.loads(path.read_text(encoding="utf-8"))
              if payload.get("status") in {"accepted", "skipped_market_closed"}:
                  skip = "true"
              elif payload.get("status") == "incomplete_source":
                  groups = sorted(retry_groups_from_manifest(payload))
                  retry = f"--retry-families {','.join(groups)}" if groups else ""
          with open(output, "a", encoding="utf-8") as handle:
              handle.write(f"retry={retry}\nskip={skip}\n")
          PY
          fi

      - name: Acquire compact daily sources
        id: acquire
        if: steps.args.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python -m rotation_radar.daily_risk_features ${{ steps.args.outputs.value }} ${{ steps.args.outputs.retry }}

      - name: Verify manifests and compact persistence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          manifests = list(Path("data/risk_features/daily").glob("**/manifest.json"))
          if not manifests:
              raise SystemExit("No daily manifest generated")
          for path in manifests:
              payload = json.loads(path.read_text(encoding="utf-8"))
              if payload.get("future_data_violation_count") != 0:
                  raise SystemExit(f"future-data violation: {path}")
              if payload.get("status") not in {"accepted", "skipped_market_closed", "incomplete_source"}:
                  raise SystemExit(f"invalid manifest status: {path}: {payload.get('status')}")
          print(f"verified_manifests={len(manifests)}")
          PY

      - name: Persist compact shards and manifests to Git
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/risk_features
          if git diff --cached --quiet; then
            echo "No new risk source rows (idempotent rerun or no new TDCC week)."
          else
            git commit -m "Update daily risk feature sources"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload secondary audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-risk-feature-audit-${{ github.run_id }}
          path: data/risk_features/daily/**/manifest.json
          if-no-files-found: warn

      - name: Classify deferred official source
        if: always() && steps.acquire.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.args.outputs.mode }}" != "single" ]; then
            echo "Backfill acquisition failed and requires review." >&2
            exit 2
          fi
          python - "${{ steps.args.outputs.target }}" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          from rotation_radar.daily_risk_features import MANDATORY_FAMILIES

          target = sys.argv[1]
          path = Path("data/risk_features/daily") / target.replace("-", "/") / "manifest.json"
          if not path.exists():
              raise SystemExit("Acquisition failed without a persisted manifest")
          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("status") != "incomplete_source" or payload.get("future_data_violation_count") != 0:
              raise SystemExit(f"Unexpected failed acquisition state: {payload.get('status')}")
          blocked = [
              f"{row.get('family')}:{row.get('market')}"
              for row in payload.get("sources", [])
              if row.get("family") in MANDATORY_FAMILIES
              and row.get("status") != "accepted"
          ]
          message = f"Official source deferred for {target}; persisted valid shards and will retry automatically: {', '.join(blocked)}"
          print(f"::warning::{message}")
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as handle:
                  handle.write(f"## Deferred official source\n\n{message}\n")
          PY
