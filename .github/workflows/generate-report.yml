name: Generate theme rotation report

on:
  schedule:
    # Wake only during Taipei weekday afternoons/evenings. The shared TWSE gate
    # still rejects holidays, typhoon closures and other non-trading days.
    - cron: "0 7-15 * * 1-5"
  workflow_dispatch:
    inputs:
      force_sector_scan:
        description: "Refresh full-market theme scan instead of using cache"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_depth_refresh:
        description: "Skip institutional and margin depth refresh"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      report_drive_folder_id:
        description: "Deprecated. Dated backup PDF is disabled unless ROTATION_ENABLE_DATED_BACKUP=true."
        required: false
        default: ""
      skip_public_upload:
        description: "Skip updating the fixed public PDF during manual runs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      report_date:
        description: "Optional manual-run report date, YYYY-MM-DD"
        required: false
        default: ""
      require_exact_report_date:
        description: "Manual run exact mode: skip/fail instead of falling back to latest complete report date"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      actual_trade_override_date:
        description: "Optional actual 00631L trade date, YYYY-MM-DD"
        required: false
        default: ""
      actual_trade_override_action:
        description: "Optional actual 00631L trade action; actual fills reset CD7"
        required: false
        default: "none"
        type: choice
        options:
          - "none"
          - "buy"
          - "sell"
      actual_trade_override_price:
        description: "Actual average price; required for buy, state only"
        required: false
        default: ""
      require_private_report:
        description: "Require private strategy PDF generation and same-day Drive update"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: daily-theme-rotation-report
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout shared schedule rules
        uses: actions/checkout@v4
        with:
          repository: ryan-AI-stock/AI_stock_schedule_rules
          ref: main
          path: AI_stock_schedule_rules

      - name: Determine target Taiwan trading date
        id: report-date
        shell: bash
        env:
          SCHEDULE_RULES_PATH: ${{ github.workspace }}/AI_stock_schedule_rules/schedule_rules.json
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            report_date="${{ inputs.report_date }}"
            if [ -z "${report_date}" ]; then
              report_date="$(TZ=Asia/Taipei date +%F)"
            fi
            report_key="${report_date//-/}"
            echo "Target Taiwan trading date: ${report_date} (manual workflow_dispatch; fallback allowed unless exact mode is enabled)"
            {
              echo "should_run=true"
              echo "target_date=${report_date}"
              echo "target_key=${report_key}"
              echo "reason=manual_workflow_dispatch"
            } >> "$GITHUB_OUTPUT"
          else
            python -m rotation_radar.schedule_gate
          fi

      - name: Restore trading-date publish marker
        id: daily-publish-marker
        if: steps.report-date.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .github-run-state/rotation-report-published
          key: rotation-report-published-${{ steps.report-date.outputs.target_key }}

      - name: Stop when schedule gate says not to run
        if: steps.report-date.outputs.should_run != 'true'
        run: echo "Schedule gate skipped this run; reason=${{ steps.report-date.outputs.reason }}"

      - name: Stop scheduled retry after successful trading-date publish
        if: steps.report-date.outputs.should_run == 'true' && github.event_name == 'schedule' && steps.daily-publish-marker.outputs.cache-hit == 'true'
        run: echo "The target trading-date report was already generated and fully published; skipping this scheduled retry."

      - name: Set up Python
        if: steps.report-date.outputs.should_run == 'true' && (github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true')
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install report and test dependencies
        if: steps.report-date.outputs.should_run == 'true' && (github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true')
        run: |
          python -m pip install --upgrade pip
          pip install '.[test]'

      - name: Check fixed Google Drive report completion
        id: drive-completion
        if: steps.report-date.outputs.should_run == 'true' && github.event_name == 'schedule' && steps.daily-publish-marker.outputs.cache-hit != 'true'
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          ROTATION_PUBLIC_REPORT_DRIVE_FOLDER_ID: 16SmfPgMMIs7MWteeX1h2EkhSIEaGvpHn
          ROTATION_PRIVATE_REPORT_DRIVE_FOLDER_ID: 1O6Se-HfI7ZDTQ-LWeAO6f8vtvoLcCzIj
          ROTATION_PUBLIC_REPORT_DRIVE_FILE_ID: ""
        shell: bash
        run: |
          set +e
          python -m rotation_radar.drive_publish --check-current-report --date "${{ steps.report-date.outputs.target_date }}"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when Google Drive report is already current
        if: steps.drive-completion.outputs.already_published == 'true'
        run: echo "The fixed Google Drive Radar PDF is current for this trading date; skipping automatic regeneration."

      - name: Install Chromium for report rendering
        if: steps.report-date.outputs.should_run == 'true' && (github.event_name == 'workflow_dispatch' || (steps.daily-publish-marker.outputs.cache-hit != 'true' && steps.drive-completion.outputs.already_published != 'true'))
        run: python -m playwright install --with-deps chromium

      - name: Restore market data cache
        if: steps.report-date.outputs.should_run == 'true' && (github.event_name == 'workflow_dispatch' || (steps.daily-publish-marker.outputs.cache-hit != 'true' && steps.drive-completion.outputs.already_published != 'true'))
        uses: actions/cache@v4
        with:
          path: |
            data/market_universe.generated.csv
            data/sector_map.generated.csv
            data/market_quotes.generated.csv
            data/theme_history.generated.csv
            raw_data
            processed_data
          key: market-data-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ github.ref_name }}-
            market-data-

      - name: Validate Python and tests
        if: steps.report-date.outputs.should_run == 'true' && (github.event_name == 'workflow_dispatch' || (steps.daily-publish-marker.outputs.cache-hit != 'true' && steps.drive-completion.outputs.already_published != 'true'))
        run: |
          python -m compileall rotation_radar tests
          python -m unittest discover -s tests -v

      - name: Generate latest report
        id: generate-report
        if: steps.report-date.outputs.should_run == 'true' && (github.event_name == 'workflow_dispatch' || (steps.daily-publish-marker.outputs.cache-hit != 'true' && steps.drive-completion.outputs.already_published != 'true'))
        shell: bash
        run: |
          set -euo pipefail

          args=(--update-latest-report --report-date "${{ steps.report-date.outputs.target_date }}" --output reports/latest.html)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            args+=(--manual-rerun)
            if [ "${{ inputs.require_exact_report_date }}" = "true" ]; then
              args+=(--require-exact-report-date)
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_sector_scan }}" = "true" ]; then
            args+=(--force-sector-scan)
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.report_date }}" ]; then
            args+=(--sector-scan-max-age-days 30)
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_depth_refresh }}" = "true" ]; then
            args+=(--skip-depth-refresh)
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.actual_trade_override_action }}" != "none" ]; then
            args+=(--actual-trade-override-date "${{ inputs.actual_trade_override_date }}")
            args+=(--actual-trade-override-action "${{ inputs.actual_trade_override_action }}")
            if [ -n "${{ inputs.actual_trade_override_price }}" ]; then
              args+=(--actual-trade-override-price "${{ inputs.actual_trade_override_price }}")
            fi
          fi

          set +e
          python -m rotation_radar.cli "${args[@]}"
          status=$?
          set -e
          if [ "$status" -eq 75 ]; then
            echo "report_ready=false" >> "$GITHUB_OUTPUT"
            echo "### Radar 等待收盤資料" >> "$GITHUB_STEP_SUMMARY"
            echo "目標交易日的 TWSE/TPEx 快照尚未完整，下一次每小時排程會自動重試。" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          echo "report_ready=true" >> "$GITHUB_OUTPUT"

      - name: Resolve actual report date
        id: actual-report-date
        if: steps.generate-report.outputs.report_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          actual_date="$(python -c 'import json; from pathlib import Path; manifest = json.loads(Path("reports/latest_manifest.json").read_text(encoding="utf-8")); print(manifest.get("actual_report_date") or manifest.get("report_date") or "")')"
          if [ -z "${actual_date}" ]; then
            echo "Missing actual report date in reports/latest_manifest.json"
            exit 1
          fi
          actual_key="${actual_date//-/}"
          echo "Actual report date: ${actual_date}"
          {
            echo "actual_report_date=${actual_date}"
            echo "actual_report_key=${actual_key}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate formal signal checkpoint
        if: steps.generate-report.outputs.report_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          from rotation_radar.formal_signal import validate_formal_signal_checkpoint

          checkpoint = json.loads(Path("reports/formal_0050_00631l_checkpoint.json").read_text(encoding="utf-8"))
          manifest = json.loads(Path("reports/latest_manifest.json").read_text(encoding="utf-8"))
          validate_formal_signal_checkpoint(checkpoint)
          assert checkpoint["report_date"] == manifest["actual_report_date"]
          assert checkpoint["signal_ticker"] == "0050"
          assert checkpoint["execution_ticker"] == "00631L"
          assert checkpoint["signal_carry_forward_used"] is False
          assert checkpoint["future_data_violation_count"] == 0
          print(json.dumps({
              "formal_signal_report_date": checkpoint["report_date"],
              "today_signal": checkpoint["today_signal"],
              "model_next_day_execution_action": checkpoint["model_next_day_execution_action"],
              "model_next_day_execution_date": checkpoint["model_next_day_execution_date"],
              "actual_trade_date": checkpoint["actual_trade_date"],
              "next_tradable_date": checkpoint["next_tradable_date"],
          }, ensure_ascii=False))
          PY

      - name: Build complete private strategy report from official history
        if: steps.generate-report.outputs.report_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          next_execution_date="$(python -c 'import json; from pathlib import Path; print(json.loads(Path("reports/formal_0050_00631l_checkpoint.json").read_text(encoding="utf-8"))["model_next_day_execution_date"])')"
          python -m scripts.build_private_strategy_report \
            --date "${{ steps.actual-report-date.outputs.actual_report_date }}" \
            --next-execution-date "${next_execution_date}" \
            --state data/private_strategy_state.json \
            --output reports/private_strategy_daily.html

      - name: Commit formal radar candidate interface and CD state
        if: steps.generate-report.outputs.report_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f data/formal_radar_candidates.latest.csv ]; then
            echo "Missing data/formal_radar_candidates.latest.csv"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/formal_radar_candidates.latest.csv data/formal_0050_00631l_state.json data/private_strategy_state.json
          if git diff --cached --quiet; then
            echo "Formal radar candidate interface unchanged."
          else
            git commit -m "Update formal radar candidates"
            branch="${GITHUB_REF_NAME:-main}"
            for attempt in 1 2 3; do
              git pull --rebase origin "${branch}"
              if git push origin "HEAD:${branch}"; then
                exit 0
              fi
              if [ "${attempt}" -lt 3 ]; then
                echo "Push raced with another workflow; retrying after remote sync (${attempt}/3)."
                sleep $((attempt * 2))
              fi
            done
            echo "Unable to persist formal Radar state after 3 synchronized push attempts." >&2
            exit 1
          fi

      - name: Publish PDFs to Google Drive
        if: steps.generate-report.outputs.report_ready == 'true'
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          # Deprecated: keep code path available, but default publishing creates only the fixed free-audience PDF.
          ROTATION_ENABLE_DATED_BACKUP: ${{ vars.ROTATION_ENABLE_DATED_BACKUP || 'false' }}
          ROTATION_REPORT_DRIVE_FOLDER_ID: ${{ inputs.report_drive_folder_id || '16SmfPgMMIs7MWteeX1h2EkhSIEaGvpHn' }}
          ROTATION_PUBLIC_REPORT_DRIVE_FOLDER_ID: 16SmfPgMMIs7MWteeX1h2EkhSIEaGvpHn
          ROTATION_PRIVATE_REPORT_DRIVE_FOLDER_ID: 1O6Se-HfI7ZDTQ-LWeAO6f8vtvoLcCzIj
          ROTATION_PUBLIC_REPORT_DRIVE_FILE_ID: ""
        shell: bash
        run: |
          set -euo pipefail
          args=(--html reports/latest.html --private-html reports/private_strategy_daily.html --date "${{ steps.actual-report-date.outputs.actual_report_date }}")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_public_upload }}" = "true" ]; then
            args+=(--skip-public-upload)
          fi
          python -m rotation_radar.drive_publish "${args[@]}"

      - name: Verify private strategy PDF on Google Drive
        if: steps.generate-report.outputs.report_ready == 'true' && (github.event_name != 'workflow_dispatch' || inputs.require_private_report == 'true')
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          ROTATION_PRIVATE_REPORT_DRIVE_FOLDER_ID: 1O6Se-HfI7ZDTQ-LWeAO6f8vtvoLcCzIj
        run: |
          python -m rotation_radar.drive_publish \
            --check-private-report \
            --date "${{ steps.actual-report-date.outputs.actual_report_date }}"

      - name: Upload report artifact
        if: steps.generate-report.outputs.report_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: latest-rotation-report
          path: |
            reports/latest.html
            reports/private_strategy_daily.html
            reports/latest_manifest.json
            reports/formal_0050_00631l_checkpoint.json
            data/formal_0050_00631l_state.json
            data/private_strategy_state.json
            public_report/*.pdf
            private_report/*.pdf
          if-no-files-found: error

      - name: Upload generated data artifact
        if: steps.generate-report.outputs.report_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: |
            data/*.generated.csv
            data/*.refreshed.csv
            data/formal_radar_candidates.latest.csv
            data/history/*.csv
          if-no-files-found: ignore

      - name: Create daily publish marker
        if: github.event_name == 'schedule' && steps.daily-publish-marker.outputs.cache-hit != 'true' && (steps.generate-report.outputs.report_ready == 'true' || steps.drive-completion.outputs.already_published == 'true')
        shell: bash
        run: |
          mkdir -p .github-run-state
          printf '%s\n' "${{ steps.report-date.outputs.target_key }}" > .github-run-state/rotation-report-published

      - name: Save daily publish marker
        if: success() && github.event_name == 'schedule' && steps.daily-publish-marker.outputs.cache-hit != 'true' && (steps.generate-report.outputs.report_ready == 'true' || steps.drive-completion.outputs.already_published == 'true')
        uses: actions/cache/save@v4
        with:
          path: .github-run-state/rotation-report-published
          key: rotation-report-published-${{ steps.report-date.outputs.target_key }}
