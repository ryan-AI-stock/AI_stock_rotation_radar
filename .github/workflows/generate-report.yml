name: Generate theme rotation report

on:
  schedule:
    # Check hourly. The trading-day gate starts a new report after 15:00 Asia/Taipei
    # and keeps retrying the same trading date across midnight until fully published.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_sector_scan:
        description: "Refresh full-market theme scan instead of using cache"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_depth_refresh:
        description: "Skip institutional and margin depth refresh"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      report_drive_folder_id:
        description: "Optional manual-run Drive folder ID for the dated backup PDF"
        required: false
        default: ""
      skip_public_upload:
        description: "Skip updating the fixed public PDF during manual runs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      report_date:
        description: "Optional manual-run report date, YYYY-MM-DD"
        required: false
        default: ""

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine target Taiwan trading date
        id: report-date
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.report_date }}" ]; then
            report_date="${{ inputs.report_date }}"
            report_key="${report_date//-/}"
            echo "Target Taiwan trading date: ${report_date} (manual override)"
            {
              echo "target_date=${report_date}"
              echo "target_key=${report_key}"
            } >> "$GITHUB_OUTPUT"
          else
            python -m rotation_radar.schedule_gate
          fi

      - name: Restore trading-date publish marker
        id: daily-publish-marker
        uses: actions/cache/restore@v4
        with:
          path: .github-run-state/rotation-report-published
          key: rotation-report-published-${{ steps.report-date.outputs.target_key }}

      - name: Stop scheduled retry after successful trading-date publish
        if: github.event_name == 'schedule' && steps.daily-publish-marker.outputs.cache-hit == 'true'
        run: echo "The target trading-date report was already generated and fully published; skipping this scheduled retry."

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Drive publish dependencies
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth playwright
          python -m playwright install --with-deps chromium

      - name: Restore market data cache
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            data/market_universe.generated.csv
            data/sector_map.generated.csv
            data/market_quotes.generated.csv
            data/theme_history.generated.csv
            raw_data
            processed_data
          key: market-data-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ github.ref_name }}-
            market-data-

      - name: Check Python syntax
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        run: |
          python -m compileall rotation_radar tests
          python -m unittest discover -s tests -v

      - name: Generate latest report
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          args=(--update-latest-report --report-date "${{ steps.report-date.outputs.target_date }}" --output reports/latest.html)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_sector_scan }}" = "true" ]; then
            args+=(--force-sector-scan)
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.report_date }}" ]; then
            args+=(--sector-scan-max-age-days 30)
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_depth_refresh }}" = "true" ]; then
            args+=(--skip-depth-refresh)
          fi

          python -m rotation_radar.cli "${args[@]}"

      - name: Publish PDFs to Google Drive
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          ROTATION_REPORT_DRIVE_FOLDER_ID: ${{ inputs.report_drive_folder_id || secrets.ROTATION_REPORT_DRIVE_FOLDER_ID || vars.ROTATION_REPORT_DRIVE_FOLDER_ID }}
          ROTATION_PUBLIC_REPORT_DRIVE_FOLDER_ID: ${{ vars.ROTATION_PUBLIC_REPORT_DRIVE_FOLDER_ID }}
          ROTATION_PUBLIC_REPORT_DRIVE_FILE_ID: ${{ vars.ROTATION_PUBLIC_REPORT_DRIVE_FILE_ID }}
        shell: bash
        run: |
          set -euo pipefail
          args=(--html reports/latest.html --date "${{ steps.report-date.outputs.target_date }}")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_public_upload }}" = "true" ]; then
            args+=(--skip-public-upload)
          fi
          python -m rotation_radar.drive_publish "${args[@]}"

      - name: Upload report artifact
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: latest-rotation-report
          path: |
            reports/latest.html
            reports/*.pdf
            public_report/*.pdf
          if-no-files-found: error

      - name: Upload generated data artifact
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: |
            data/*.generated.csv
            data/*.refreshed.csv
          if-no-files-found: ignore

      - name: Create daily publish marker
        if: github.event_name == 'workflow_dispatch' || steps.daily-publish-marker.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p .github-run-state
          printf '%s\n' "${{ steps.report-date.outputs.target_key }}" > .github-run-state/rotation-report-published

      - name: Save daily publish marker
        if: success() && steps.daily-publish-marker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .github-run-state/rotation-report-published
          key: rotation-report-published-${{ steps.report-date.outputs.target_key }}
